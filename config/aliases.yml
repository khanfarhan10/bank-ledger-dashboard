# Person aliases used for name-based transaction matching.
#
# Matching is case-insensitive and ignores surrounding punctuation.
# Add as many spelling variations as you like — bank narrations are messy.
# You can also edit/add aliases live from the dashboard (Name Search page).
#
# Structure:
#   people:
#     <key>:
#       display_name: "Readable Name"
#       related_flag: benazir | nazrana | mother | sister
#       aliases: [ list of lowercase substrings to look for ]

people:
  benazir:
    display_name: "Benazir Rahaman"
    related_flag: benazir
    aliases:
      - "benazir"
      - "benazir rahaman"
      - "benazir rahman"
      - "rahaman benazir"
      - "rahman benazir"
      - "b rahaman"
      - "b rahman"
      - "benazir.rahaman.3-3@okhdfcbank"
      - "benazir.rahaman.3-4@okaxis"
      - "benazir.rahaman.3-3@okicici"
      - "benazir.rahaman.3-5@okicici"
      - "8617663869@paytm"
      - "8617663869@ptyes"
      - "8617663869"

  nazrana:
    display_name: "Nazrana / Najrana (Benazir's mother)"
    related_flag: nazrana
    aliases:
      - "nazrana"
      - "najrana"
      - "nazrana khatun"
      - "najrana khatun"
      - "nazrana khatoon"
      - "najrana khatoon"

  husna_ara_bano:
    display_name: "Husna Ara Bano (Mother)"
    related_flag: mother
    aliases:
      - "husna ara bano"
      - "husna"
      - "husnaarabano"
      - "husna ara"
      - "9852378779"

  zarinne:
