# Classification categories.
#
# These are the starting categories. You can add more from the dashboard
# (Classification pages) or by editing this list. New categories added in the
# UI are stored in the SQLite `categories` table and merged with this list.
#
# Categories are intentionally plain strings — no hidden behaviour is attached
# to any particular name. Classification is rule-based and transparent.

categories:
  # people
  - benazir_payments
  - nazrana_payments
  - benazir_repayment
  - family_transfer
  # income (real money in)
  - salary_or_income
  - it_refund
  - interest_income
  - cashback_reward
  # own-money movement (not income / not expense)
  - self_transfer
  - refund_reversal
  - investment
  - investment_redemption
  # obligations
  - insurance
  - loan_or_emi
  # everyday spend
  - food
  - groceries
  - shopping
  - transport
  - fuel
  - utilities
  - entertainment
  - education
  - medical
  - cash_withdrawal
  - bank_charges
  - large_expenses
  - personal_expense
  - family_expense
  - transfer
  # fallback
  - unknown
  - review_later

# Manual review statuses available as flags on each transaction.
review_statuses:
  - unreviewed
  - confirmed_related
  - probably_related
  - not_related
  - unknown
  - review_later
  - do_not_remember
