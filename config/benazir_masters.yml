# Benazir relationship ledger — organised as MASTERS.
#
# Each master is ONE logical expense/event (SUMMARY-A, SUMMARY-B, ...) with a
# headline plus the detail/historic transactions that back it. Members are
# matched to real bank/Paytm rows where possible (rigorously verified from the
# raw records); where a payment isn't a single bank row (credit-card EMI,
# Flipkart, pre-2024, or split) it is added as a manual entry.
#
# Header fields (title / detail / base_date) are EDITABLE in the dashboard;
# this file is just the seed. base_date defaults to the earliest member date.
#
# member fields:
#   amount, direction (PAID_OUT/RECEIVED), date
#   manual: true        -> always create a manual entry (not in bank data)
#   match: true         -> find the real bank/Paytm row by date+amount (default)
#   historic: true      -> kept as evidence; EXCLUDED from the master's net total
#   label               -> short description for this line
#
# summary_amount (optional): explicit headline; else computed = paid - received
#                            over non-historic members.

